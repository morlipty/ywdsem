# Theme
include                     ~/.config/kitty/Catppuccin-Mocha.conf
selection_foreground        none
selection_background        none
# Font
# font_family                 family='Iosevka Term' style='Extended' features='+ss15'
font_family                 family='Maple Mono NF'
font_size                   12
# Nerd Fonts v3.4.0
symbol_map                  U+e000-U+e00a,U+e0a0-U+e0a2,U+e0a3,U+e0b0-U+e0b3,U+e0b4-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ea60-U+ec1e,U+ed00-U+efce,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono
# Cursor
cursor_trail                1
# Window
window_padding_width        8
hide_window_decorations     yes
# Audio bell
enable_audio_bell           no
# Tab bar
tab_bar_style               powerline
tab_powerline_style         round
# Layout options
enabled_layouts             splits:split_axis=auto

# Keymaps
map ctrl+shift+n            new_os_window_with_cwd
map ctrl+shift+;            launch --location=vsplit --cwd=current
map ctrl+shift+'            launch --location=hsplit --cwd=current

map ctrl+shift+h            neighboring_window left
map ctrl+shift+j            neighboring_window down
map ctrl+shift+k            neighboring_window up
map ctrl+shift+l            neighboring_window right

map ctrl+shift+[            scroll_line_down smooth
map ctrl+shift+]            scroll_line_up smooth

map ctrl+shift+/            show_scrollback

map ctrl+shift+m            combine | layout_action maximize vertical | layout_action maximize horizontal 

map ctrl+shift+left         layout_action move_to_screen_edge left
map ctrl+shift+down         layout_action move_to_screen_edge bottom
map ctrl+shift+up           layout_action move_to_screen_edge top
map ctrl+shift+right        layout_action move_to_screen_edge right
