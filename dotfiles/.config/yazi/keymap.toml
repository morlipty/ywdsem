[[mgr.prepend_keymap]]
on  = "M"
run = "plugin mount"

[[mgr.prepend_keymap]]
on  = "<C-o>"
run = 'shell --block -- ~/ywdsem/scripts/open-with/open-with.sh "$0"'
desc = "Open the hovered item with"

[[mgr.prepend_keymap]]
on = "i"
run = "cd --interactive"
desc = "Run interactive cd to go"

[[mgr.prepend_keymap]]
on = "e"
run = "shell ' $0' --cursor=0 --interactive"
desc = "Run command to that file"

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin smart-enter"
desc = "Smart enter"

[[mgr.prepend_keymap]]
on = "R"
run = "rename --empty=stem --cursor=start"
desc = "Rename from scratch"

[[mgr.prepend_keymap]]
on = [ "g", "t" ]
run = "cd ~/.local/share/Trash/files/"
desc = "Go Trash"

[[mgr.prepend_keymap]]
on = [ "g", "D" ]
run = "cd ~/Documents/"
desc = "Go ~/Documents"

[[mgr.prepend_keymap]]
on = [ "g", "y" ]
run = "cd ~/ywdsem/"
desc = "Go ywdsem"

[[input.prepend_keymap]]
on = "<Esc>"
run = "close"
desc = "Cancel input"
