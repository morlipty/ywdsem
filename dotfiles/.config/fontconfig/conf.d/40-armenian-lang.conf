<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="pattern">
    <test compare="eq" name="family">
      <string>sans-serif</string>
    </test>
    <edit mode="prepend" name="family">
      <string>Noto Sans Armenian</string>
    </edit>
  </match>
</fontconfig>
