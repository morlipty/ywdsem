[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = [ "g", "t" ]
run = "cd ~/.local/share/Trash/files/"
desc = "Go Trash"

[[mgr.prepend_keymap]]
on = [ "g", "D" ]
run = "cd ~/Documents/"
desc = "Go ~/Documents"

[[mgr.prepend_keymap]]
on = [ "g", "y" ]
run = "cd ~/ywdsem/"
desc = "Go ywdsem"
